[platformio]
description = ESP32 SRAM pressure demo: Bluetooth + ADC + Arduino Audio Tools Opus encoder
default_envs = esp32dev_bt

[env]
platform = espressif32@6.12.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = huge_app.csv
lib_ldf_mode = deep+
lib_deps =
    arduino-audio-tools=https://github.com/pschatzmann/arduino-audio-tools/archive/refs/tags/v1.0.1.zip
    arduino-libopus=https://github.com/pschatzmann/arduino-libopus/archive/refs/tags/a1.1.0.zip
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DAUDIOKIT_LOG_LEVEL=AudioLoggerInfo
  -DARDUINO_LOOP_STACK_SIZE=16384

[env:esp32dev_bt]
build_flags =
  ${env.build_flags}
  -DENABLE_BT=1

[env:esp32dev_no_bt]
build_flags =
  ${env.build_flags}
  -DENABLE_BT=0
